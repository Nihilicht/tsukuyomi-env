  <polyline points="340,118 213,118" fill="none" stroke="var(--b)" stroke-width="0.5"/>
  <polyline points="340,118 339,118" fill="none" stroke="var(--b)" stroke-width="0.5"/>
  <polyline points="340,118 465,118" fill="none" stroke="var(--b)" stroke-width="0.5"/>
  <polyline points="340,118 591,118" fill="none" stroke="var(--b)" stroke-width="0.5"/>

