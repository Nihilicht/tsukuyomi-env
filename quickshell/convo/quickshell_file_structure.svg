    <rect x="158" y="118" width="110" height="34" rx="8" stroke-width="0.5"/>
    <text class="th" x="213" y="135" text-anchor="middle" dominant-baseline="central">services/</text>
  </g>
  <!-- overlays/ -->
  <g class="c-coral">
    <rect x="284" y="118" width="110" height="34" rx="8" stroke-width="0.5"/>
    <text class="th" x="339" y="135" text-anchor="middle" dominant-baseline="central">overlays/</text>
  </g>
  <!-- widgets/ -->
  <g class="c-amber">
    <rect x="410" y="118" width="110" height="34" rx="8" stroke-width="0.5"/>
