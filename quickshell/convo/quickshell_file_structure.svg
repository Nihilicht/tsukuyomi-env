    <text class="ts" x="213" y="354" text-anchor="middle" dominant-baseline="central">NotifService.qml</text>
  </g>
  <line x1="213" y1="368" x2="213" y2="382" stroke="var(--b)" stroke-width="0.5"/>
  <g class="c-teal">
    <rect x="152" y="382" width="122" height="28" rx="6" stroke-width="0.5"/>
    <text class="ts" x="213" y="396" text-anchor="middle" dominant-baseline="central">CliphistService.qml</text>
  </g>

  <!-- ===== OVERLAYS column ===== -->
  <line x1="339" y1="152" x2="339" y2="172" stroke="var(--b)" stroke-width="0.5"/>
  <g class="c-coral">
    <rect x="278" y="172" width="122" height="28" rx="6" stroke-width="0.5"/>
    <text class="ts" x="339" y="186" text-anchor="middle" dominant-baseline="central">PowerMenu.qml</text>
  </g>
  <line x1="339" y1="200" x2="339" y2="214" stroke="var(--b)" stroke-width="0.5"/>
  <g class="c-coral">
    <rect x="278" y="214" width="122" height="28" rx="6" stroke-width="0.5"/>
    <text class="ts" x="339" y="228" text-anchor="middle" dominant-baseline="central">NetworkPanel.qml</text>
  </g>
  <line x1="339" y1="242" x2="339" y2="256" stroke="var(--b)" stroke-width="0.5"/>
  <g class="c-coral">
    <rect x="278" y="256" width="122" height="28" rx="6" stroke-width="0.5"/>
    <text class="ts" x="339" y="270" text-anchor="middle" dominant-baseline="central">VolumePanel.qml</text>
  </g>
  <line x1="339" y1="284" x2="339" y2="298" stroke="var(--b)" stroke-width="0.5"/>
  <g class="c-coral">
    <rect x="278" y="298" width="122" height="28" rx="6" stroke-width="0.5"/>
    <text class="ts" x="339" y="312" text-anchor="middle" dominant-baseline="central">SysInfoPanel.qml</text>
  </g>
  <line x1="339" y1="326" x2="339" y2="340" stroke="var(--b)" stroke-width="0.5"/>
  <g class="c-coral">
    <rect x="278" y="340" width="122" height="28" rx="6" stroke-width="0.5"/>
    <text class="ts" x="339" y="354" text-anchor="middle" dominant-baseline="central">CalendarPanel.qml</text>
  </g>
  <line x1="339" y1="368" x2="339" y2="382" stroke="var(--b)" stroke-width="0.5"/>
  <g class="c-coral">
    <rect x="278" y="382" width="122" height="28" rx="6" stroke-width="0.5"/>
    <text class="ts" x="339" y="396" text-anchor="middle" dominant-baseline="central">Launcher.qml</text>
  </g>
  <line x1="339" y1="410" x2="339" y2="424" stroke="var(--b)" stroke-width="0.5"/>
  <g class="c-coral">
    <rect x="278" y="424" width="122" height="28" rx="6" stroke-width="0.5"/>
    <text class="ts" x="339" y="438" text-anchor="middle" dominant-baseline="central">NotifShade.qml</text>
  </g>
  <line x1="339" y1="452" x2="339" y2="466" stroke="var(--b)" stroke-width="0.5"/>
  <g class="c-coral">
    <rect x="278" y="466" width="122" height="28" rx="6" stroke-width="0.5"/>
    <text class="ts" x="339" y="480" text-anchor="middle" dominant-baseline="central">OSD.qml</text>
  </g>

  <!-- ===== WIDGETS column ===== -->
  <line x1="465" y1="152" x2="465" y2="172" stroke="var(--b)" stroke-width="0.5"/>
  <g class="c-amber">
    <rect x="404" y="172" width="122" height="28" rx="6" stroke-width="0.5"/>
    <text class="ts" x="465" y="186" text-anchor="middle" dominant-baseline="central">MetricChip.qml</text>
  </g>
  <line x1="465" y1="200" x2="465" y2="214" stroke="var(--b)" stroke-width="0.5"/>
  <g class="c-amber">
    <rect x="404" y="214" width="122" height="28" rx="6" stroke-width="0.5"/>
    <text class="ts" x="465" y="228" text-anchor="middle" dominant-baseline="central">InvertedCorner.qml</text>
  </g>
  <line x1="465" y1="242" x2="465" y2="256" stroke="var(--b)" stroke-width="0.5"/>
  <g class="c-amber">
    <rect x="404" y="256" width="122" height="28" rx="6" stroke-width="0.5"/>
    <text class="ts" x="465" y="270" text-anchor="middle" dominant-baseline="central">CircleToggle.qml</text>
  </g>
  <line x1="465" y1="284" x2="465" y2="298" stroke="var(--b)" stroke-width="0.5"/>
  <g class="c-amber">
    <rect x="404" y="298" width="122" height="28" rx="6" stroke-width="0.5"/>
    <text class="ts" x="465" y="312" text-anchor="middle" dominant-baseline="central">GraphView.qml</text>
  </g>
  <line x1="465" y1="326" x2="465" y2="340" stroke="var(--b)" stroke-width="0.5"/>
  <g class="c-amber">
    <rect x="404" y="340" width="122" height="28" rx="6" stroke-width="0.5"/>
    <text class="ts" x="465" y="354" text-anchor="middle" dominant-baseline="central">TooltipPopup.qml</text>
  </g>
  <line x1="465" y1="368" x2="465" y2="382" stroke="var(--b)" stroke-width="0.5"/>
  <g class="c-amber">
    <rect x="404" y="382" width="122" height="28" rx="6" stroke-width="0.5"/>
    <text class="ts" x="465" y="396" text-anchor="middle" dominant-baseline="central">TabBar.qml</text>
  </g>
  <line x1="465" y1="410" x2="465" y2="424" stroke="var(--b)" stroke-width="0.5"/>
  <g class="c-amber">
    <rect x="404" y="424" width="122" height="28" rx="6" stroke-width="0.5"/>
    <text class="ts" x="465" y="438" text-anchor="middle" dominant-baseline="central">AnimButton.qml</text>
  </g>

  <!-- ===== THEME column ===== -->
  <line x1="591" y1="152" x2="591" y2="172" stroke="var(--b)" stroke-width="0.5"/>
  <g class="c-gray">
    <rect x="530" y="172" width="122" height="28" rx="6" stroke-width="0.5"/>
    <text class="ts" x="591" y="186" text-anchor="middle" dominant-baseline="central">Colors.qml</text>
  </g>
  <line x1="591" y1="200" x2="591" y2="214" stroke="var(--b)" stroke-width="0.5"/>
  <g class="c-gray">
    <rect x="530" y="214" width="122" height="28" rx="6" stroke-width="0.5"/>
    <text class="ts" x="591" y="228" text-anchor="middle" dominant-baseline="central">Typography.qml</text>
  </g>
  <line x1="591" y1="242" x2="591" y2="256" stroke="var(--b)" stroke-width="0.5"/>
  <g class="c-gray">
    <rect x="530" y="256" width="122" height="28" rx="6" stroke-width="0.5"/>
    <text class="ts" x="591" y="270" text-anchor="middle" dominant-baseline="central">Easing.qml</text>
  </g>
  <line x1="591" y1="284" x2="591" y2="298" stroke="var(--b)" stroke-width="0.5"/>
  <g class="c-gray">
    <rect x="530" y="298" width="122" height="28" rx="6" stroke-width="0.5"/>
    <text class="ts" x="591" y="312" text-anchor="middle" dominant-baseline="central">Sizes.qml</text>
  </g>

  <!-- Legend -->
  <rect x="40" y="530" width="600" height="110" rx="10" fill="none" stroke="var(--b)" stroke-width="0.5" opacity="0.4"/>
  <text class="ts" x="340" y="548" text-anchor="middle" dominant-baseline="central" opacity="0.7">Legend</text>

  <rect x="64" y="563" width="14" height="14" rx="3" class="c-blue"/>
  <text class="ts" x="86" y="570" dominant-baseline="central">bar/ — top panel structure</text>

  <rect x="64" y="587" width="14" height="14" rx="3" class="c-teal"/>
  <text class="ts" x="86" y="594" dominant-baseline="central">services/ — singleton data providers (QtObject, no UI)</text>

  <rect x="350" y="563" width="14" height="14" rx="3" class="c-coral"/>
  <text class="ts" x="372" y="570" dominant-baseline="central">overlays/ — floating panels and OSD</text>

  <rect x="350" y="587" width="14" height="14" rx="3" class="c-amber"/>
  <text class="ts" x="372" y="594" dominant-baseline="central">widgets/ — reusable primitive components</text>

  <rect x="64" y="611" width="14" height="14" rx="3" class="c-gray"/>
  <text class="ts" x="86" y="618" dominant-baseline="central">theme/ — Catppuccin Mocha tokens, easing, sizing constants</text>

  <!-- Notes section -->
  <text class="ts" x="40" y="668" dominant-baseline="central" opacity="0.8">Key design rules for this structure:</text>
  <text class="ts" x="40" y="692" dominant-baseline="central" opacity="0.65">→  SystemMetrics.qml is the single polling process (1s timer, all metrics in one Bash/Process call)</text>
  <text class="ts" x="40" y="712" dominant-baseline="central" opacity="0.65">→  Services expose properties only — no anchors, no visual items</text>
  <text class="ts" x="40" y="732" dominant-baseline="central" opacity="0.65">→  Overlays are PanelWindow with ShaderEffect for inverted corner masking</text>
  <text class="ts" x="40" y="752" dominant-baseline="central" opacity="0.65">→  Widgets are pure QML components — no service imports, accept data via properties</text>
  <text class="ts" x="40" y="772" dominant-baseline="central" opacity="0.65">→  bar/continents/ and bar/islands/ can be sub-folders within bar/ as the panel grows</text>
</svg>
