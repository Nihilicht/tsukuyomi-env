  <g class="c-blue">
    <rect x="24" y="384" width="126" height="28" rx="6" stroke-width="0.5"/>
    <text class="ts" x="87" y="398" text-anchor="middle" dominant-baseline="central">WorkspaceIsland.qml</text>
  </g>
  <line x1="87" y1="412" x2="87" y2="426" stroke="var(--b)" stroke-width="0.5"/>
  <g class="c-blue">
    <rect x="24" y="426" width="126" height="28" rx="6" stroke-width="0.5"/>
    <text class="ts" x="87" y="440" text-anchor="middle" dominant-baseline="central">ClockIsland.qml</text>
  </g>
  <line x1="87" y1="454" x2="87" y2="468" stroke="var(--b)" stroke-width="0.5"/>
  <g class="c-blue">
