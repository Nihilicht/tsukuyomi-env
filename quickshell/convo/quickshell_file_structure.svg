
<svg width="100%" viewBox="0 0 680 980" role="img">
  <title>Quickshell project file structure</title>
  <desc>A structural diagram showing the recommended file organization for a Quickshell desktop shell project, grouped by feature concern.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <!-- Root -->
  <g class="c-gray">
    <rect x="260" y="16" width="160" height="36" rx="8" stroke-width="0.5"/>
    <text class="th" x="340" y="34" text-anchor="middle" dominant-baseline="central">~/.config/quickshell/</text>
  </g>
  <line x1="340" y1="52" x2="340" y2="72" class="arr" marker-end="url(#arrow)"/>

  <!-- shell.qml -->
  <g class="c-purple">
    <rect x="274" y="72" width="132" height="34" rx="8" stroke-width="0.5"/>
    <text class="th" x="340" y="89" text-anchor="middle" dominant-baseline="central">shell.qml</text>
  </g>
  <line x1="340" y1="106" x2="340" y2="118" class="arr" marker-end="url(#arrow)"/>

  <!-- Second level: main folders -->
  <!-- bar/ -->
  <g class="c-blue">
    <rect x="32" y="118" width="110" height="34" rx="8" stroke-width="0.5"/>
    <text class="th" x="87" y="135" text-anchor="middle" dominant-baseline="central">bar/</text>
  </g>
  <!-- services/ -->
