<svg width="100%" viewBox="0 0 680 980" role="img">
  <title>Quickshell revised file structure v2</title>
  <desc>Revised Quickshell file organization with native plugins, renamed components, and explicit archipelago order.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <!-- Root -->
  <g class="c-gray">
    <rect x="240" y="14" width="200" height="34" rx="8" stroke-width="0.5"/>
    <text class="th" x="340" y="31" text-anchor="middle" dominant-baseline="central">~/.config/quickshell/</text>
  </g>
  <line x1="340" y1="48" x2="340" y2="66" stroke="var(--b)" stroke-width="0.5" marker-end="url(#arrow)"/>

  <!-- shell.qml -->
  <g class="c-purple">
    <rect x="276" y="66" width="128" height="32" rx="8" stroke-width="0.5"/>
    <text class="th" x="340" y="82" text-anchor="middle" dominant-baseline="central">shell.qml</text>
  </g>

  <!-- branch lines -->
  <line x1="77" y1="98" x2="605" y2="98" stroke="var(--b)" stroke-width="0.5"/>
  <line x1="340" y1="98" x2="340" y2="108" stroke="var(--b)" stroke-width="0.5"/>
  <line x1="77" y1="98" x2="77" y2="108" stroke="var(--b)" stroke-width="0.5"/>
  <line x1="209" y1="98" x2="209" y2="108" stroke="var(--b)" stroke-width="0.5"/>
  <line x1="473" y1="98" x2="473" y2="108" stroke="var(--b)" stroke-width="0.5"/>
  <line x1="605" y1="98" x2="605" y2="108" stroke="var(--b)" stroke-width="0.5"/>

  <!-- Column headers -->
  <g class="c-blue"><rect x="18" y="108" width="118" height="32" rx="8" stroke-width="0.5"/>
    <text class="th" x="77" y="124" text-anchor="middle" dominant-baseline="central">bar/</text></g>
  <g class="c-teal"><rect x="150" y="108" width="118" height="32" rx="8" stroke-width="0.5"/>
    <text class="th" x="209" y="124" text-anchor="middle" dominant-baseline="central">services/</text></g>
  <g class="c-coral"><rect x="282" y="108" width="118" height="32" rx="8" stroke-width="0.5"/>
    <text class="th" x="341" y="124" text-anchor="middle" dominant-baseline="central">overlays/</text></g>
  <g class="c-amber"><rect x="414" y="108" width="118" height="32" rx="8" stroke-width="0.5"/>
    <text class="th" x="473" y="124" text-anchor="middle" dominant-baseline="central">widgets/</text></g>
  <g class="c-gray"><rect x="546" y="108" width="118" height="32" rx="8" stroke-width="0.5"/>
    <text class="th" x="605" y="124" text-anchor="middle" dominant-baseline="central">theme/</text></g>

  <!-- ===== BAR ===== -->
  <line x1="77" y1="140" x2="77" y2="154" stroke="var(--b)" stroke-width="0.5"/>
  <g class="c-blue"><rect x="18" y="154" width="118" height="26" rx="6" stroke-width="0.5"/>
    <text class="ts" x="77" y="167" text-anchor="middle" dominant-baseline="central">TopBar.qml</text></g>
  <line x1="77" y1="180" x2="77" y2="194" stroke="var(--b)" stroke-width="0.5"/>
  <g class="c-blue"><rect x="18" y="194" width="118" height="26" rx="6" stroke-width="0.5"/>
    <text class="ts" x="77" y="207" text-anchor="middle" dominant-baseline="central">ScreenFrame.qml</text></g>

  <text class="ts" x="77" y="238" text-anchor="middle" opacity="0.5">continents/</text>
  <line x1="77" y1="245" x2="77" y2="259" stroke="var(--b)" stroke-width="0.5"/>
  <g class="c-blue"><rect x="18" y="259" width="118" height="26" rx="6" stroke-width="0.5"/>
    <text class="ts" x="77" y="272" text-anchor="middle" dominant-baseline="central">SysInfo.qml</text></g>
  <line x1="77" y1="285" x2="77" y2="299" stroke="var(--b)" stroke-width="0.5"/>
  <g class="c-blue"><rect x="18" y="299" width="118" height="26" rx="6" stroke-width="0.5"/>
    <text class="ts" x="77" y="312" text-anchor="middle" dominant-baseline="central">SysActions.qml</text></g>

  <text class="ts" x="77" y="342" text-anchor="middle" opacity="0.5">islands/</text>
  <line x1="77" y1="349" x2="77" y2="363" stroke="var(--b)" stroke-width="0.5"/>
  <g class="c-blue"><rect x="18" y="363" width="118" height="26" rx="6" stroke-width="0.5"/>
    <text class="ts" x="77" y="376" text-anchor="middle" dominant-baseline="central">Workspaces.qml</text></g>
  <line x1="77" y1="389" x2="77" y2="403" stroke="var(--b)" stroke-width="0.5"/>
  <!-- archipelago dashed box -->
  <rect x="14" y="403" width="126" height="94" rx="8" fill="none" stroke="var(--b)" stroke-dasharray="4 3" stroke-width="0.5" opacity="0.5"/>
  <text class="ts" x="77" y="417" text-anchor="middle" opacity="0.5">Archipelago</text>
  <g class="c-blue"><rect x="22" y="422" width="110" height="22" rx="5" stroke-width="0.5"/>
    <text class="ts" x="77" y="433" text-anchor="middle" dominant-baseline="central">CaffeineToggle.qml</text></g>
  <g class="c-blue"><rect x="22" y="448" width="110" height="22" rx="5" stroke-width="0.5"/>
    <text class="ts" x="77" y="459" text-anchor="middle" dominant-baseline="central">Clock.qml</text></g>
  <g class="c-blue"><rect x="22" y="474" width="110" height="22" rx="5" stroke-width="0.5"/>
    <text class="ts" x="77" y="485" text-anchor="middle" dominant-baseline="central">DndToggle.qml</text></g>
  <line x1="77" y1="497" x2="77" y2="511" stroke="var(--b)" stroke-width="0.5"/>
  <g class="c-blue"><rect x="18" y="511" width="118" height="26" rx="6" stroke-width="0.5"/>
    <text class="ts" x="77" y="524" text-anchor="middle" dominant-baseline="central">SystemTray.qml</text></g>

  <!-- ===== SERVICES ===== -->
  <line x1="209" y1="140" x2="209" y2="154" stroke="var(--b)" stroke-width="0.5"/>
  <!-- dashed highlight for the one custom service -->
  <rect x="146" y="150" width="126" height="34" rx="8" fill="none" stroke="var(--b)" stroke-dasharray="4 3" stroke-width="1" opacity="0.6"/>
  <g class="c-teal"><rect x="150" y="154" width="118" height="26" rx="6" stroke-width="0.5"/>
    <text class="ts" x="209" y="167" text-anchor="middle" dominant-baseline="central">SystemMetrics.qml</text></g>
  <text class="ts" x="209" y="200" text-anchor="middle" opacity="0.45">native plugins — import directly,</text>
  <text class="ts" x="209" y="216" text-anchor="middle" opacity="0.45">no wrapper files needed:</text>
  <rect x="150" y="228" width="118" height="22" rx="6" fill="none" stroke="var(--b)" stroke-width="0.5" opacity="0.35"/>
  <text class="ts" x="209" y="239" text-anchor="middle" dominant-baseline="central" opacity="0.55">Hyprland.*</text>
  <rect x="150" y="254" width="118" height="22" rx="6" fill="none" stroke="var(--b)" stroke-width="0.5" opacity="0.35"/>
  <text class="ts" x="209" y="265" text-anchor="middle" dominant-baseline="central" opacity="0.55">NetworkManager.*</text>
  <rect x="150" y="280" width="118" height="22" rx="6" fill="none" stroke="var(--b)" stroke-width="0.5" opacity="0.35"/>
  <text class="ts" x="209" y="291" text-anchor="middle" dominant-baseline="central" opacity="0.55">Wireplumber.*</text>

  <!-- ===== OVERLAYS ===== -->
  <line x1="341" y1="140" x2="341" y2="154" stroke="var(--b)" stroke-width="0.5"/>
  <g class="c-coral"><rect x="282" y="154" width="118" height="26" rx="6" stroke-width="0.5"/>
    <text class="ts" x="341" y="167" text-anchor="middle" dominant-baseline="central">PowerMenu.qml</text></g>
  <line x1="341" y1="180" x2="341" y2="194" stroke="var(--b)" stroke-width="0.5"/>
  <g class="c-coral"><rect x="282" y="194" width="118" height="26" rx="6" stroke-width="0.5"/>
    <text class="ts" x="341" y="207" text-anchor="middle" dominant-baseline="central">NetworkControl.qml</text></g>
  <line x1="341" y1="220" x2="341" y2="234" stroke="var(--b)" stroke-width="0.5"/>
  <g class="c-coral"><rect x="282" y="234" width="118" height="26" rx="6" stroke-width="0.5"/>
    <text class="ts" x="341" y="247" text-anchor="middle" dominant-baseline="central">VolumeControl.qml</text></g>
  <line x1="341" y1="260" x2="341" y2="274" stroke="var(--b)" stroke-width="0.5"/>
  <g class="c-coral"><rect x="282" y="274" width="118" height="26" rx="6" stroke-width="0.5"/>
    <text class="ts" x="341" y="287" text-anchor="middle" dominant-baseline="central">SysInfoOverlay.qml</text></g>
  <line x1="341" y1="300" x2="341" y2="314" stroke="var(--b)" stroke-width="0.5"/>
  <g class="c-coral"><rect x="282" y="314" width="118" height="26" rx="6" stroke-width="0.5"/>
    <text class="ts" x="341" y="327" text-anchor="middle" dominant-baseline="central">Calendar.qml</text></g>
  <line x1="341" y1="340" x2="341" y2="354" stroke="var(--b)" stroke-width="0.5"/>
  <g class="c-coral"><rect x="282" y="354" width="118" height="26" rx="6" stroke-width="0.5"/>
    <text class="ts" x="341" y="367" text-anchor="middle" dominant-baseline="central">Launcher.qml</text></g>
  <line x1="341" y1="380" x2="341" y2="394" stroke="var(--b)" stroke-width="0.5"/>
  <g class="c-coral"><rect x="282" y="394" width="118" height="26" rx="6" stroke-width="0.5"/>
    <text class="ts" x="341" y="407" text-anchor="middle" dominant-baseline="central">NotifShade.qml</text></g>
  <line x1="341" y1="420" x2="341" y2="434" stroke="var(--b)" stroke-width="0.5"/>
  <g class="c-coral"><rect x="282" y="434" width="118" height="26" rx="6" stroke-width="0.5"/>
    <text class="ts" x="341" y="447" text-anchor="middle" dominant-baseline="central">OSD.qml</text></g>

  <!-- ===== WIDGETS ===== -->
  <line x1="473" y1="140" x2="473" y2="154" stroke="var(--b)" stroke-width="0.5"/>
  <g class="c-amber"><rect x="414" y="154" width="118" height="26" rx="6" stroke-width="0.5"/>
    <text class="ts" x="473" y="167" text-anchor="middle" dominant-baseline="central">MetricChip.qml</text></g>
  <line x1="473" y1="180" x2="473" y2="194" stroke="var(--b)" stroke-width="0.5"/>
  <g class="c-amber"><rect x="414" y="194" width="118" height="26" rx="6" stroke-width="0.5"/>
    <text class="ts" x="473" y="207" text-anchor="middle" dominant-baseline="central">LiquidCorner.qml</text></g>
  <line x1="473" y1="220" x2="473" y2="234" stroke="var(--b)" stroke-width="0.5"/>
  <g class="c-amber"><rect x="414" y="234" width="118" height="26" rx="6" stroke-width="0.5"/>
    <text class="ts" x="473" y="247" text-anchor="middle" dominant-baseline="central">RoundToggle.qml</text></g>
  <line x1="473" y1="260" x2="473" y2="274" stroke="var(--b)" stroke-width="0.5"/>
  <g class="c-amber"><rect x="414" y="274" width="118" height="26" rx="6" stroke-width="0.5"/>
    <text class="ts" x="473" y="287" text-anchor="middle" dominant-baseline="central">SparkGraph.qml</text></g>
  <line x1="473" y1="300" x2="473" y2="314" stroke="var(--b)" stroke-width="0.5"/>
  <g class="c-amber"><rect x="414" y="314" width="118" height="26" rx="6" stroke-width="0.5"/>
    <text class="ts" x="473" y="327" text-anchor="middle" dominant-baseline="central">HoverTooltip.qml</text></g>
  <line x1="473" y1="340" x2="473" y2="354" stroke="var(--b)" stroke-width="0.5"/>
  <g class="c-amber"><rect x="414" y="354" width="118" height="26" rx="6" stroke-width="0.5"/>
    <text class="ts" x="473" y="367" text-anchor="middle" dominant-baseline="central">PillTab.qml</text></g>
  <line x1="473" y1="380" x2="473" y2="394" stroke="var(--b)" stroke-width="0.5"/>
  <g class="c-amber"><rect x="414" y="394" width="118" height="26" rx="6" stroke-width="0.5"/>
    <text class="ts" x="473" y="407" text-anchor="middle" dominant-baseline="central">RippleButton.qml</text></g>
  <line x1="473" y1="420" x2="473" y2="434" stroke="var(--b)" stroke-width="0.5"/>
  <g class="c-amber"><rect x="414" y="434" width="118" height="26" rx="6" stroke-width="0.5"/>
    <text class="ts" x="473" y="447" text-anchor="middle" dominant-baseline="central">SignalBar.qml</text></g>

  <!-- ===== THEME ===== -->
  <line x1="605" y1="140" x2="605" y2="154" stroke="var(--b)" stroke-width="0.5"/>
  <g class="c-gray"><rect x="546" y="154" width="118" height="26" rx="6" stroke-width="0.5"/>
    <text class="ts" x="605" y="167" text-anchor="middle" dominant-baseline="central">Palette.qml</text></g>
  <line x1="605" y1="180" x2="605" y2="194" stroke="var(--b)" stroke-width="0.5"/>
  <g class="c-gray"><rect x="546" y="194" width="118" height="26" rx="6" stroke-width="0.5"/>
    <text class="ts" x="605" y="207" text-anchor="middle" dominant-baseline="central">Typography.qml</text></g>
  <line x1="605" y1="220" x2="605" y2="234" stroke="var(--b)" stroke-width="0.5"/>
  <g class="c-gray"><rect x="546" y="234" width="118" height="26" rx="6" stroke-width="0.5"/>
    <text class="ts" x="605" y="247" text-anchor="middle" dominant-baseline="central">Easing.qml</text></g>
  <line x1="605" y1="260" x2="605" y2="274" stroke="var(--b)" stroke-width="0.5"/>
  <g class="c-gray"><rect x="546" y="274" width="118" height="26" rx="6" stroke-width="0.5"/>
    <text class="ts" x="605" y="287" text-anchor="middle" dominant-baseline="central">Sizing.qml</text></g>

  <!-- Archipelago order strip -->
  <rect x="40" y="560" width="600" height="58" rx="10" fill="none" stroke="var(--b)" stroke-width="0.5" opacity="0.4"/>
  <text class="ts" x="56" y="577" dominant-baseline="central" opacity="0.55">Archipelago order (left → right, floats as one island):</text>
  <g class="c-teal"><rect x="56" y="586" width="130" height="22" rx="6" stroke-width="0.5"/>
    <text class="ts" x="121" y="597" text-anchor="middle" dominant-baseline="central">CaffeineToggle.qml</text></g>
  <text class="ts" x="200" y="597" text-anchor="middle" dominant-baseline="central">→</text>
  <g class="c-purple"><rect x="214" y="586" width="78" height="22" rx="6" stroke-width="0.5"/>
    <text class="ts" x="253" y="597" text-anchor="middle" dominant-baseline="central">Clock.qml</text></g>
  <text class="ts" x="306" y="597" text-anchor="middle" dominant-baseline="central">→</text>
  <g class="c-teal"><rect x="320" y="586" width="104" height="22" rx="6" stroke-width="0.5"/>
    <text class="ts" x="372" y="597" text-anchor="middle" dominant-baseline="central">DndToggle.qml</text></g>

  <!-- Key decisions -->
  <text class="ts" x="40" y="640" dominant-baseline="central" opacity="0.8">Key decisions:</text>
  <text class="ts" x="40" y="662" dominant-baseline="central" opacity="0.6">→  SystemMetrics.qml is the only custom service — 1s timer, single Process call, all hw metrics</text>
  <text class="ts" x="40" y="682" dominant-baseline="central" opacity="0.6">→  Hyprland.*, NetworkManager.*, Wireplumber.* imported directly wherever needed — no wrappers</text>
  <text class="ts" x="40" y="702" dominant-baseline="central" opacity="0.6">→  LiquidCorner.qml (ShaderEffect) shared across ScreenFrame, TopBar continents, and all overlays</text>
  <text class="ts" x="40" y="722" dominant-baseline="central" opacity="0.6">→  RoundToggle.qml is base primitive; CaffeineToggle and DndToggle compose it with their own state</text>
  <text class="ts" x="40" y="742" dominant-baseline="central" opacity="0.6">→  Palette.qml is pragma Singleton — import Theme 1.0 from anywhere for Catppuccin Mocha tokens</text>

  <!-- Legend -->
  <rect x="40" y="768" width="600" height="88" rx="10" fill="none" stroke="var(--b)" stroke-width="0.5" opacity="0.3"/>
  <rect x="58" y="786" width="12" height="12" rx="3" class="c-blue"/>
  <text class="ts" x="78" y="792" dominant-baseline="central">bar/ — panel layout and structure</text>
  <rect x="58" y="806" width="12" height="12" rx="3" class="c-teal"/>
  <text class="ts" x="78" y="812" dominant-baseline="central">services/ — SystemMetrics only; native plugins used directly</text>
  <rect x="58" y="826" width="12" height="12" rx="3" class="c-gray"/>
  <text class="ts" x="78" y="832" dominant-baseline="central">theme/ — Catppuccin Mocha, easing, sizing as pragma Singletons</text>
  <rect x="350" y="786" width="12" height="12" rx="3" class="c-coral"/>
  <text class="ts" x="370" y="792" dominant-baseline="central">overlays/ — PopupWindow / PanelWindow floating panels</text>
  <rect x="350" y="806" width="12" height="12" rx="3" class="c-amber"/>
  <text class="ts" x="370" y="812" dominant-baseline="central">widgets/ — stateless primitives, data via properties only</text>
</svg>

